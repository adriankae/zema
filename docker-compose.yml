name: ${COMPOSE_PROJECT_NAME:-zema}

services:
  postgres:
    container_name: zema-postgres
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: eczema
      POSTGRES_USER: eczema
      POSTGRES_PASSWORD: eczema
    ports:
      - "${ZEMA_POSTGRES_HOST_BIND:-127.0.0.1}:${ZEMA_POSTGRES_PORT:-15432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eczema -d eczema"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - zema-postgres-data:/var/lib/postgresql/data

  zema-be:
    container_name: zema-be
    build:
      context: .
      dockerfile: docker/api.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://eczema:eczema@postgres:5432/eczema
      APP_ENV: local
      DEPLOYMENT_TIMEZONE: ${CZM_TIMEZONE:-Europe/Berlin}
      APP_PORT: 28173
      ZEMA_HOST_BIND: ${ZEMA_HOST_BIND:-127.0.0.1}
      ZEMA_PORT: ${ZEMA_PORT:-28173}
      ENABLE_SCHEDULER: "true"
      JWT_SECRET: change-me-in-production
      INITIAL_USERNAME: admin
      INITIAL_PASSWORD: admin
      LOCATION_IMAGE_DIR: /data/location-images
      LOCATION_IMAGE_MAX_BYTES: 5242880
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${ZEMA_HOST_BIND:-127.0.0.1}:${ZEMA_PORT:-28173}:28173"
    volumes:
      - zema-location-images:/data/location-images

  zema-cli:
    container_name: zema-cli
    build:
      context: .
      dockerfile: docker/cli.Dockerfile
    environment:
      CZM_BASE_URL: http://zema-be:28173
      CZM_TIMEZONE: Europe/Berlin
      CZM_API_KEY: ${CZM_API_KEY:-}
    depends_on:
      - zema-be
    profiles:
      - cli

  zema-telegram:
    container_name: zema-telegram
    build:
      context: .
      dockerfile: docker/telegram.Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql+psycopg://eczema:eczema@postgres:5432/eczema
      APP_ENV: local
      DEPLOYMENT_TIMEZONE: ${CZM_TIMEZONE:-Europe/Berlin}
      APP_PORT: 28173
      TELEGRAM_BACKEND_URL: http://zema-be:28173
      ENABLE_SCHEDULER: "false"
      JWT_SECRET: change-me-in-production
      INITIAL_USERNAME: admin
      INITIAL_PASSWORD: admin
      LOCATION_IMAGE_DIR: /data/location-images
      LOCATION_IMAGE_MAX_BYTES: 5242880
    depends_on:
      postgres:
        condition: service_healthy
      zema-be:
        condition: service_started
    volumes:
      - zema-location-images:/data/location-images
    profiles:
      - telegram

volumes:
  zema-postgres-data:
    name: zema-postgres-data
  zema-location-images:
    name: zema-location-images
